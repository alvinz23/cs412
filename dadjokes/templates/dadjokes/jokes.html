{% extends 'dadjokes/base.html' %}

{% block content %}
  <h2>All Jokes</h2>
  {% for joke in jokes %}
    <div class="card">
      <p>{{ joke.text }}</p>
      <p class="meta">Contributed by {{ joke.contributor }} | <a href="{% url 'dadjokes_joke_detail' joke.pk %}">Details</a></p>
    </div>
  {% empty %}
    <p>No jokes found.</p>
  {% endfor %}
{% endblock %}
