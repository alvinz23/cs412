<section class="filters">
    <h3>Filter Voters</h3>
    <form method="GET">
        <div class="filter-grid">
            <label for="id_party">Party</label>
            <select name="party" id="id_party">
                <option value="">Any</option>
                {% for party in party_choices %}
                <option value="{{ party }}" {% if party == selected_party %}selected{% endif %}>{{ party|default:"(blank)" }}</option>
                {% endfor %}
            </select>

            <label for="id_min_year">Min Birth Year</label>
            <select name="min_year" id="id_min_year">
                <option value="">Any</option>
                {% for year in year_choices %}
                <option value="{{ year }}" {% if year|stringformat:'s' == selected_min_year %}selected{% endif %}>{{ year }}</option>
                {% endfor %}
            </select>

            <label for="id_max_year">Max Birth Year</label>
            <select name="max_year" id="id_max_year">
                <option value="">Any</option>
                {% for year in year_choices %}
                <option value="{{ year }}" {% if year|stringformat:'s' == selected_max_year %}selected{% endif %}>{{ year }}</option>
                {% endfor %}
            </select>

            <label for="id_voter_score">Voter Score</label>
            <select name="voter_score" id="id_voter_score">
                <option value="">Any</option>
                {% for score in score_choices %}
                <option value="{{ score }}" {% if score|stringformat:'s' == selected_score %}selected{% endif %}>{{ score }}</option>
                {% endfor %}
            </select>
        </div>

        <fieldset>
            <legend>Election Participation</legend>
            <label><input type="checkbox" name="v20state" {% if selected_elections.v20state %}checked{% endif %}> v20state</label>
            <label><input type="checkbox" name="v21town" {% if selected_elections.v21town %}checked{% endif %}> v21town</label>
            <label><input type="checkbox" name="v21primary" {% if selected_elections.v21primary %}checked{% endif %}> v21primary</label>
            <label><input type="checkbox" name="v22general" {% if selected_elections.v22general %}checked{% endif %}> v22general</label>
            <label><input type="checkbox" name="v23town" {% if selected_elections.v23town %}checked{% endif %}> v23town</label>
        </fieldset>

        <div class="actions">
            <button type="submit">Apply Filters</button>
            <a href="{{ request.path }}">Clear</a>
        </div>
    </form>
</section>
