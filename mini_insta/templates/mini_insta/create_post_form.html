{% extends "mini_insta/base.html" %}

{% block content %}
<h2>Create Post for {{ profile.display_name }}</h2>

<section class="form-panel">
    <form action="{% url 'create_post' profile.pk %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <p>
            <label for="id_caption">Caption:</label>
            {{ form.caption }}
        </p>

        <p>
            <label for="id_files">Upload Photos:</label>
            <input type="file" name="files" id="id_files" multiple>
        </p>

        <p class="form-actions">
            <button type="submit">Submit Post</button>
            <a class="button-link" href="{% url 'show_profile' profile.pk %}">Cancel</a>
        </p>
    </form>
</section>
{% endblock %}
