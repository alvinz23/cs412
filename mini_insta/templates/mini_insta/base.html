<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Insta</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'mini_insta/styles.css' %}?v=20260220a">
</head>
<body>
    <header class="site-header">
        <h1>Mini Insta</h1>
        <nav>
            <a href="{% url 'show_all_profiles' %}">All Profiles</a>
            {% if profile %}
            <a href="{% url 'show_feed' profile.pk %}">Feed</a>
            <a href="{% url 'show_profile' profile.pk %}">Profile</a>
            <a href="{% url 'search' profile.pk %}">Search</a>
            {% endif %}
        </nav>
    </header>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        {% if profile %}
        <a href="{% url 'show_feed' profile.pk %}">Home</a>
        <a href="{% url 'show_profile' profile.pk %}">Profile</a>
        <a href="{% url 'create_post' profile.pk %}">Create Post</a>
        <a href="{% url 'search' profile.pk %}">Search</a>
        {% else %}
        <a href="{% url 'show_all_profiles' %}">Back to Profile List</a>
        {% endif %}
    </footer>
</body>
</html>
